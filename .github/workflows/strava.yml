name: Fetch Strava Data

on:
  schedule:
    - cron: '0 * * * *'   # Runs daily at 6am UTC — adjust as needed
  workflow_dispatch:        # Lets you trigger it manually from GitHub UI

permissions:
  contents: write           # Needed to commit strava_data.json back to the repo

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests

      - name: Fetch Strava activities
        env:
          STRAVA_CLIENT_ID:     ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
        run: python fetch_strava.py

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/strava_data.json
          git diff --staged --quiet || git commit -m "chore: update Strava data"
          git push
